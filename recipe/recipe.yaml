schema_version: 1

context:
  name: qlient
  version: "1.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/qlient-${{ version }}.tar.gz
  sha256: e23ae92e70cc909b866a70db6e2fd6b4832cf14d36596427ba3879be499966d4

build:
  number: 2
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - poetry-core >=1.0.0
    - pip
  run:
    - python >=${{ python_min }},<4.0
    - qlient-core >=1.0.1,<2.0.0
    - requests >=2.27.1,<3.0.0
    - websocket-client >=1.3.3,<2.0.0

tests:
  - python:
      imports:
        - qlient
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: A fast and modern graphql client designed with simplicity in mind.
  license: MIT
  license_file: LICENSE
  homepage: https://qlient-org.github.io/python-qlient/

extra:
  recipe-maintainers:
    - jan-janssen
